# Nginx configuration snippet for NAF AI
# Add these locations to your existing server block (e.g., in /etc/nginx/sites-available/default)

server {
    listen 80;
    server_name 143.244.133.125; # Replace with your domain if applicable

    # Frontend (Vite dev server or static build)
    location / {
        proxy_pass http://localhost:3006;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend (Flask API)
    # The frontend currently points directly to port 5006, 
    # but you can use this block if you want to proxy through port 80/api
    location /api/ {
        proxy_pass http://localhost:5006/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
