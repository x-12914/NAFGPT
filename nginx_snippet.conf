# ========================================================================
# NAF AI ASSISTANT (Port 3007)
# ========================================================================
server {
    listen 3007;
    server_name 143.244.133.125;

    # 🛠️ Static files built from 'frontend/dist' (after you run npm run build)
    location / {
        root /home/opt/NAFGPT/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 🔗 Proxy API requests to the Python Backend (Port 5006)
    # This allows the frontend to talk to the backend through the same port (3007)
    location /api/ {
        proxy_pass http://127.0.0.1:5006/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Extended timeouts for AI analysis
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;

        # Allow large PDF uploads
        client_max_body_size 50M;
    }

    # Specialized logs for NAF AI
    error_log /var/log/nginx/naf_error.log;
    access_log /var/log/nginx/naf_access.log;
}
